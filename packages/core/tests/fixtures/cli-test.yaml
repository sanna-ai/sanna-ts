sanna_constitution: "0.1.0"

identity:
  agent_name: test-cli-agent
  domain: cli-testing
  description: Test constitution for CLI child process interception

provenance:
  authored_by: test-author
  approved_by:
    - test-approver
  approval_date: "2026-01-01"
  approval_method: manual

boundaries:
  - id: B001
    description: No unauthorized file deletion
    category: safety
    severity: critical

trust_tiers:
  autonomous:
    - "read_file"
  requires_approval:
    - "write_file"
  prohibited:
    - "delete_system"

halt_conditions:
  - id: H001
    trigger: Destructive file operation
    escalate_to: human_review
    severity: critical
    enforcement: halt

invariants:
  - id: INV001
    rule: No rm -rf on root
    enforcement: halt

cli_permissions:
  mode: strict
  justification_required: true
  commands:
    - id: CLI001
      binary: git
      authority: can_execute
      argv_pattern: "*"
      description: Git version control
    - id: CLI002
      binary: rm
      authority: cannot_execute
      argv_pattern: "-rf *"
      description: Recursive force delete
    - id: CLI003
      binary: rm
      authority: can_execute
      argv_pattern: "*"
      description: Regular rm
    - id: CLI004
      binary: docker
      authority: must_escalate
      argv_pattern: "*"
      description: Docker commands require approval
      escalation_target: ops-team
    - id: CLI005
      binary: ls
      authority: can_execute
      argv_pattern: "*"
      description: List files
    - id: CLI006
      binary: echo
      authority: can_execute
      argv_pattern: "*"
      description: Echo command
    - id: CLI007
      binary: node
      authority: can_execute
      argv_pattern: "*"
      description: Node.js runtime
    - id: CLI008
      binary: cat
      authority: can_execute
      argv_pattern: "*"
      description: Concatenate files
  invariants:
    - id: CLINV001
      description: No sudo usage
      verdict: halt
      pattern: "sudo"
    - id: CLINV002
      description: Warn on pipe to shell
      verdict: warn
      pattern: "\\| sh$"
